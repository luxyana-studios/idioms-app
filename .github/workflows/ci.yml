name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test:ci

      - name: Security audit
        run: |
          npm audit --json > /tmp/audit.json || true
          node -e '
            const data = JSON.parse(require("fs").readFileSync("/tmp/audit.json","utf8"));
            const vulns = Object.values(data.vulnerabilities || {});
            for (const v of vulns) {
              const fix = v.fixAvailable ? "fix available" : "no fix";
              console.log(`${v.severity.toUpperCase()} ${v.name} (${fix})`);
              v.via.filter(r => typeof r === "object").forEach(r => console.log(`  ${r.title} - ${r.url}`));
            }
            const fixable = vulns.filter(v => (v.severity === "high" || v.severity === "critical") && v.fixAvailable);
            if (fixable.length) {
              console.error(`\n${fixable.length} fixable high/critical vulnerabilities found.`);
              process.exit(1);
            }
            console.log("\nNo fixable high/critical vulnerabilities.");
          '
